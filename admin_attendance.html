<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFS Admin Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --accent: #2D6A2D; --accent-dim: rgba(45,106,45,0.12);
            --gold: #C8960C; --gold-dim: rgba(200,150,12,0.12);
            --success-bg: #EAF5E4; --success-text: #1A5C1A;
            --error-bg: #FEF0F0; --error-text: #C0392B;
            --text: #1A2010; --text-2: #4A5540; --text-3: #8A9A80;
            --border: rgba(0,0,0,0.09); --card: #FFFFFF; --bg: #F3F5F0;
            --r-sm: 8px; --r-lg: 22px;
            --shadow: 0 8px 48px rgba(0,0,0,0.45), 0 2px 12px rgba(0,0,0,0.25);
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #1a2a1a; min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow-x: hidden;
            color: var(--text);
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url('hotr-bg.jpg');
            background-size: cover; background-position: center 30%;
            filter: blur(3px) brightness(0.32) saturate(0.6);
            transform: scale(1.05); z-index: 0;
        }
        body::after {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 20%, rgba(5,15,5,0.65) 100%);
            z-index: 0;
        }
        .card {
            position: relative; z-index: 1;
            background: var(--card); border-radius: var(--r-lg);
            box-shadow: var(--shadow);
            width: 100%; max-width: 420px; overflow: hidden;
            animation: rise 0.4s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes rise {
            from { opacity:0; transform: translateY(20px) scale(0.97); }
            to   { opacity:1; transform: none; }
        }
        .card-header { padding: 22px 26px 16px; border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .brand-text { display: flex; flex-direction: column; gap: 2px; }
        .brand-name   { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: #26361b; }
        .brand-school { font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: #7ac042; }
        .brand-divider { width: 1px; height: 30px; background: rgba(0,0,0,0.12); flex-shrink: 0; }
        .page-title { font-size: 20px; font-weight: 700; color: var(--text); }
        .session-badge {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 600; padding: 3px 10px;
            border-radius: 99px; margin-top: 8px;
            background: var(--accent-dim); color: var(--accent);
        }
        .session-badge.loading { background: var(--bg); color: var(--text-3); }
        .session-badge.closed  { background: var(--error-bg); color: var(--error-text); }

        .screen { display: none; }
        .screen.active { display: block; }
        .card-body { padding: 22px 26px 26px; }

        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .field label { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; }
        .field .hint { font-size: 11px; color: var(--text-3); }
        .field .err  { font-size: 11px; color: var(--error-text); display: none; }
        .field .err.show { display: block; }

        select, input[type="text"] {
            width: 100%; height: 46px; padding: 0 14px;
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: var(--r-sm); font-family: 'DM Sans', sans-serif;
            font-size: 15px; color: var(--text); outline: none;
            transition: border-color .15s, box-shadow .15s;
            -webkit-appearance: none;
        }
        select:focus, input[type="text"]:focus {
            border-color: var(--accent); background: #fff;
            box-shadow: 0 0 0 3px var(--accent-dim);
        }
        select.invalid, input.invalid { border-color: var(--error-text); }

        .event-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .event-btn {
            height: 58px; border: 2px solid var(--border);
            border-radius: var(--r-sm); background: var(--bg);
            font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
            color: var(--text-2); cursor: pointer; transition: all .15s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .event-btn span { font-size: 10px; font-weight: 500; color: var(--text-3); }
        .event-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .event-btn.selected { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
        .event-btn.selected span { color: var(--accent); }

        .loc-row {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg); border-radius: var(--r-sm);
            padding: 10px 14px; margin-bottom: 14px;
        }
        .loc-label { font-size: 12px; color: var(--text-3); font-weight: 500; }
        .loc-pill { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; }
        .loc-pill.loading { background: #FEF3C7; color: #92400E; }
        .loc-pill.ok      { background: var(--success-bg); color: var(--success-text); }
        .loc-pill.err     { background: var(--error-bg); color: var(--error-text); }

        .online-wrap { background: var(--bg); border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 14px; }
        .online-row  { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .online-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); flex-shrink: 0; }
        .online-label { font-size: 13px; font-weight: 600; color: var(--text-2); }
        .online-code-field { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .online-code-field.show { display: block; }

        .btn {
            width: 100%; height: 50px; border: none; border-radius: var(--r-sm);
            font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity .15s, transform .1s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn:enabled:hover  { opacity: 0.88; }
        .btn:enabled:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #fff; }

        .status-msg {
            margin-top: 14px; padding: 13px 16px; border-radius: var(--r-sm);
            font-size: 13px; font-weight: 500; text-align: center;
            display: none; line-height: 1.5;
        }
        .status-msg.error   { background: var(--error-bg);   color: var(--error-text);   display: block; }
        .status-msg.success { background: var(--success-bg); color: var(--success-text); display: block; }

        /* ── Success screen ── */
        .success-wrap { text-align: center; padding: 12px 0 4px; }
        .success-icon { font-size: 52px; margin-bottom: 16px; }
        .success-title { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .success-name  { font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
        .success-meta  { font-size: 13px; color: var(--text-3); margin-bottom: 24px; }
        .success-detail {
            background: var(--success-bg); border-radius: var(--r-sm);
            padding: 12px 16px; margin-bottom: 20px; text-align: left;
        }
        .success-detail-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
        .success-detail-row span:first-child { color: var(--text-3); }
        .success-detail-row span:last-child  { font-weight: 600; color: var(--text); }
        .btn-again { background: var(--bg); color: var(--text-2); border: 1.5px solid var(--border); margin-top: 4px; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="brand">
            <svg viewBox="0 0 1535.61 720.7" width="52" height="24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#7ac042" d="M0,693.1l17.76-27.95,78.77-14.93,39.53-55.38c77.39-18.85,157.19-33.28,236.48-44.4,298.97-41.95,607.51-36.4,904.31,19.14,48.81,9.13,92.27,16.51,137.14,38.78,15.07,7.48,54.7,29.33,64.06,41.87,6.62,8.87,11.26,24.98,17.82,34.63,6.09,3.05,24.83,2.93,29.31,6.17,1.19.86,10.43,20.26,10.44,21.53-8.4,1.77-17.28-.18-25.46-.53-172.91-7.3-345.62-20.92-518.95-15.98-120.92,3.45-242.02,15.47-362.82,21.05-167.22,7.73-335,2.5-501.9-11.03-42.2-3.42-84.32-8.22-126.47-11.98v-1Z"/>
                <path fill="#26361b" d="M905.76,112.87v160.78c24.25-7.17,48.56-17.58,74.47-15.96,28.01,1.75,53.53,16.33,75.81,32.13,50,35.45,119.73,106.25,181.15,113.65,13.1,1.58,26.08-1.17,36.47,9.51,5.34,5.49,12.01,21.51,12.01,28.95v22.47l-64.98,1v45.94c-35.89-4.17-71.67-10.41-107.6-14.86-242.16-30.01-485.68-27.78-727.54,4.01-19.03,2.5-37.9,6.26-57.05,7.91-2.5-13.93-2.65-28.83-1.58-43h-41.99v-31.46c0-3.13,1.55-12.2,2.48-15.5,2.27-8.01,6.95-12.37,15.27-13.7,101.98-.92,204.14,1.97,304.17-19.72,86.33-18.72,163.38-55.83,243.75-90.56.54-17.23-.14-34.53.17-51.77.1-5.48-.09-10.99,0-16.48,15.76-35.82,32.94-71.42,50.13-106.71.93-1.91,1.92-4.24,3-5.99.46-.74,1.51-2.57,1.85-.64Z"/>
                <path fill="#f6eb19" d="M850.78,242.7c-75.13,29.86-146.12,67.66-224.73,88.6-38.12,10.16-77.21,16.63-116.54,20.16l-1.47-1.58c-9.55-57.54-3.35-116.46,19.35-170.07C583.95,46.3,728.79-28.69,870.99,10.3c109.33,29.97,193.87,126.56,210.72,238.39-1.54.38-2.17-.63-3.28-1.2-7.95-4.12-16.61-11.38-25.03-15.94-30.39-16.47-65.95-25.9-100.59-19.82l-47.04-98.85c-.35-1.93-1.4-.09-1.85.64-1.08,1.75-2.07,4.08-3,5.99-17.19,35.29-34.37,70.89-50.13,106.71-.09,5.49.1,11,0,16.48Z"/>
            </svg>
            <div class="brand-divider"></div>
            <div class="brand-text">
                <span class="brand-name">House on the Rock Lagos</span>
                <span class="brand-school">Rock Foundation School — Admin</span>
            </div>
        </div>
        <div class="page-title">Admin Attendance</div>
        <div class="session-badge loading" id="sessionBadge">Loading session…</div>
    </div>

    <!-- Check-in screen -->
    <div class="screen active" id="screenCheckin">
        <div class="card-body">
            <div class="field">
                <label>Your Name</label>
                <select id="nameSelect">
                    <option value="">Loading names…</option>
                </select>
                <span class="err" id="nameErr">Please select your name</span>
            </div>

            <div class="field" style="margin-bottom:10px;">
                <label>Session</label>
            </div>
            <div class="event-grid">
                <button class="event-btn" id="btnSun" onclick="selectEvent('SUN')" disabled>
                    Sunday<span>Service</span>
                </button>
                <button class="event-btn" id="btnSat" onclick="selectEvent('SAT')" disabled>
                    Saturday<span>All-Day</span>
                </button>
            </div>

            <div class="loc-row" id="locRow">
                <span class="loc-label">Your location</span>
                <span class="loc-pill loading" id="locPill">Locating…</span>
            </div>

            <div class="online-wrap">
                <label class="online-row">
                    <input type="checkbox" id="onlineToggle" onchange="handleOnlineToggle()">
                    <span class="online-label">I am attending remotely</span>
                </label>
                <div class="online-code-field" id="onlineCodeField">
                    <div class="field" style="margin-bottom:0;">
                        <label>Online Code</label>
                        <input type="text" id="onlineCodeInput" placeholder="Enter session code" autocomplete="off"
                               oninput="this.value=this.value.toUpperCase(); updateBtn()">
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" id="submitBtn" onclick="handleCheckin()" disabled>
                Record Attendance
            </button>
            <div class="status-msg" id="statusMsg"></div>
        </div>
    </div>

    <!-- Success screen -->
    <div class="screen" id="screenSuccess">
        <div class="card-body">
            <div class="success-wrap">
                <div class="success-icon">✅</div>
                <div class="success-title">Attendance Recorded</div>
                <div class="success-name" id="successName"></div>
                <div class="success-meta" id="successMeta"></div>
                <div class="success-detail">
                    <div class="success-detail-row"><span>Session</span><span id="detailSession"></span></div>
                    <div class="success-detail-row"><span>Mode</span><span id="detailMode"></span></div>
                    <div class="success-detail-row"><span>Time</span><span id="detailTime"></span></div>
                </div>
                <button class="btn btn-again" onclick="resetForm()">Check In Another Admin</button>
            </div>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlxgOnRPiJACWfl_ReTJG02ttXVqr0_W9uve6DA4a25oqnYaXH9GbjlVhLil76GqEF/exec';
const SCRIPT_TOKEN = 'RFS_USpA_ADMIN@2026'; // Must match API_TOKEN in admin attendance script

    
// ── EDIT THESE if campus location changes ────────────────────
const CAMPUS_LAT     = 6.436995;  // Campus latitude
const CAMPUS_LNG     = 3.493372;   // Campus longitude
const MAX_DISTANCE_M = 100;                 // Geofence radius in metres

let selectedEvent = null;
let userLocation  = null;
let sessionData   = null;

// ── Init ──────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
    loadAdminNames();
    loadSession();
    startLocation();
});

// ── Load admin names into dropdown ────────────────────────────
async function loadAdminNames() {
    try {
        const res  = await fetch(SCRIPT_URL + '?action=get_admin_names&cb=' + Date.now());
        const data = await res.json();
        const sel  = document.getElementById('nameSelect');
        if (data.status === 'success' && data.names.length > 0) {
            sel.innerHTML = '<option value="">— Select your name —</option>' +
                data.names.map(n => '<option value="' + escHtml(n) + '">' + escHtml(n) + '</option>').join('');
            sel.addEventListener('change', updateBtn);
        } else {
            sel.innerHTML = '<option value="">Could not load names</option>';
        }
    } catch(e) {
        document.getElementById('nameSelect').innerHTML = '<option value="">Connection error</option>';
    }
}

// ── Load session ──────────────────────────────────────────────
async function loadSession() {
    const badge = document.getElementById('sessionBadge');
    try {
        const res  = await fetch(SCRIPT_URL + '?action=get_session&cb=' + Date.now());
        const data = await res.json();
        sessionData = data;
        if (data.status === 'success') {
            badge.textContent = data.className + ' · ' + data.year + ' · Stream ' + data.stream;
            badge.className   = 'session-badge';
            // Enable relevant event buttons
            const btnSun = document.getElementById('btnSun');
            const btnSat = document.getElementById('btnSat');
            if (data.sunOpen) btnSun.disabled = false;
            if (data.satMode === 'CHECKIN-OPEN' || data.satMode === 'CHECKOUT-OPEN') btnSat.disabled = false;
        } else {
            badge.textContent = data.message || 'No active session';
            badge.className   = 'session-badge closed';
        }
    } catch(e) {
        badge.textContent = 'Could not load session';
        badge.className   = 'session-badge closed';
    }
}

// ── Event selection ───────────────────────────────────────────
function selectEvent(type) {
    selectedEvent = type;
    document.getElementById('btnSun').classList.toggle('selected', type === 'SUN');
    document.getElementById('btnSat').classList.toggle('selected', type === 'SAT');
    updateBtn();
}

// ── Online toggle ─────────────────────────────────────────────
function handleOnlineToggle() {
    const isOnline = document.getElementById('onlineToggle').checked;
    document.getElementById('onlineCodeField').classList.toggle('show', isOnline);
    document.getElementById('locRow').style.display = isOnline ? 'none' : 'flex';
    updateBtn();
}

// ── Location ──────────────────────────────────────────────────
function startLocation() {
    if (!navigator.geolocation) { setLocPill('Not supported', 'err'); return; }
    navigator.geolocation.getCurrentPosition(
        pos => {
            userLocation = { latitude: pos.coords.latitude, longitude: pos.coords.longitude };
            const dist = calcDistance(CAMPUS_LAT, CAMPUS_LNG, userLocation.latitude, userLocation.longitude);
            if (dist <= MAX_DISTANCE_M) setLocPill('On campus ✓', 'ok');
            else setLocPill((dist/1000).toFixed(2) + 'km away', 'err');
            updateBtn();
        },
        err => {
            setLocPill(err.code === 1 ? 'Access denied' : 'Unavailable', 'err');
        },
        { timeout: 8000, enableHighAccuracy: true, maximumAge: 60000 }
    );
}

function setLocPill(text, state) {
    const pill = document.getElementById('locPill');
    pill.textContent = text; pill.className = 'loc-pill ' + state;
}

function calcDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── Enable/disable submit button ──────────────────────────────
function updateBtn() {
    const name     = document.getElementById('nameSelect').value;
    const isOnline = document.getElementById('onlineToggle').checked;
    const code     = document.getElementById('onlineCodeInput').value.trim();
    const locOk    = isOnline || (document.getElementById('locPill').classList.contains('ok'));
    const codeOk   = !isOnline || code.length >= 3;
    document.getElementById('submitBtn').disabled = !(name && selectedEvent && locOk && codeOk);
}

// ── Submit ────────────────────────────────────────────────────
async function handleCheckin() {
    const name     = document.getElementById('nameSelect').value;
    const isOnline = document.getElementById('onlineToggle').checked;
    const code     = isOnline ? document.getElementById('onlineCodeInput').value.trim() : '';
    const btn      = document.getElementById('submitBtn');
    const statusEl = document.getElementById('statusMsg');

    statusEl.className = 'status-msg';
    btn.disabled = true;
    btn.textContent = 'Recording…';

    // Validate online code first
    if (isOnline) {
        try {
            const vUrl = SCRIPT_URL + '?action=validate_code'
                + '&code='      + encodeURIComponent(code)
                + '&eventType=' + encodeURIComponent(selectedEvent)
                + '&cb=' + Date.now();
            const vRes  = await fetch(vUrl);
            const vData = await vRes.json();
            if (vData.status !== 'success') {
                statusEl.textContent = vData.message || 'Invalid code.';
                statusEl.className   = 'status-msg error';
                btn.disabled = false; btn.textContent = 'Record Attendance';
                return;
            }
        } catch(e) {
            statusEl.textContent = 'Connection error. Please try again.';
            statusEl.className   = 'status-msg error';
            btn.disabled = false; btn.textContent = 'Record Attendance';
            return;
        }
    }

    try {
        const url = SCRIPT_URL
            + '?action=admin_checkin'
            + '&token='     + encodeURIComponent(SCRIPT_TOKEN)
            + '&name='      + encodeURIComponent(name)
            + '&eventType=' + encodeURIComponent(selectedEvent)
            + '&mode='      + (isOnline ? 'ONLINE' : 'PHYSICAL')
            + '&latitude='  + (userLocation ? userLocation.latitude  : '')
            + '&longitude=' + (userLocation ? userLocation.longitude : '')
            + '&cb=' + Date.now();

        const res  = await fetch(url);
        const data = await res.json();

        if (data.status === 'success') {
            const now = new Date();
            document.getElementById('successName').textContent   = name;
            document.getElementById('successMeta').textContent   = 'Recorded on ' + now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
            document.getElementById('detailSession').textContent = selectedEvent === 'SUN' ? 'Sunday Service' : 'Saturday All-Day';
            document.getElementById('detailMode').textContent    = isOnline ? 'Online' : 'Physical';
            document.getElementById('detailTime').textContent    = now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
            showScreen('screenSuccess');
        } else {
            statusEl.textContent = data.message || 'Check-in failed. Please try again.';
            statusEl.className   = 'status-msg error';
            btn.disabled = false; btn.textContent = 'Record Attendance';
        }
    } catch(e) {
        statusEl.textContent = 'Connection error. Please try again.';
        statusEl.className   = 'status-msg error';
        btn.disabled = false; btn.textContent = 'Record Attendance';
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function resetForm() {
    selectedEvent = null;
    document.getElementById('nameSelect').value = '';
    document.getElementById('btnSun').classList.remove('selected');
    document.getElementById('btnSat').classList.remove('selected');
    document.getElementById('onlineToggle').checked = false;
    document.getElementById('onlineCodeField').classList.remove('show');
    document.getElementById('onlineCodeInput').value = '';
    document.getElementById('locRow').style.display = 'flex';
    document.getElementById('statusMsg').className = 'status-msg';
    document.getElementById('submitBtn').disabled  = true;
    document.getElementById('submitBtn').textContent = 'Record Attendance';
    showScreen('screenCheckin');
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
